<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر مركز الحياة - سجل المرضى</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; padding: 30px; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { color: #0284c7; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        th { background-color: #0284c7; color: white; }
        tr:nth-child(even) { background-color: #f8fafc; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 13px; display: inline-block; margin: 2px; }
        .btn-view { background-color: #3b82f6; color: white; }
        .btn-delete { background-color: #ef4444; color: white; }
        /* زر الواتساب الأخضر داخل الجدول */
        .btn-whatsapp { background-color: #25D366; color: white; border: none; }
        .btn-whatsapp:hover { background-color: #1ebd58; }
        .nav-links { display: flex; justify-content: space-between; margin-top: 20px; }
        .nav-links a { color: #0284c7; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗂️ سجل ومطبوعات كل المرضى المدخلين</h1>
    
    <table>
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>اسم المريض</th>
                <th>الردهة</th>
                <th>رقم الهاتف</th>
                <th>التحاليل المدخلة</th>
                <th>الإجراءات</th>
            </tr>
        </thead>
        <tbody id="patientsTableBody">
            </tbody>
    </table>

    <div class="nav-links">
        <a href="index.html">➕ إضافة مريض جديد</a>
    </div>
</div>

<script>
    function loadPatients() {
        const patients = JSON.parse(localStorage.getItem('allPatientsList')) || [];
        const tbody = document.getElementById('patientsTableBody');
        tbody.innerHTML = '';

        if(patients.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6">لا يوجد مرضى مسجلين حالياً.</td></tr>`;
            return;
        }

        patients.forEach((p, index) => {
            const testNames = p.tests ? Object.keys(p.tests).join(', ') : 'لا يوجد';
            const patientPhone = p.phone || 'غير مسجل';

            tbody.innerHTML += `
                <tr>
                    <td>${p.date}</td>
                    <td style="font-weight: bold;">${p.name}</td>
                    <td><span style="color: #0284c7; font-weight:bold;">${p.ward}</span></td>
                    <td>${patientPhone}</td>
                    <td style="font-size: 12px; color: #64748b;">${testNames}</td>
                    <td>
                        <button class="btn btn-view" onclick="viewPatient(${p.id})">👁️ عرض وطباعة</button>
                        <button class="btn btn-whatsapp" onclick="sendWhatsAppDirect(${index})">🟢 واتساب</button>
                        <button class="btn btn-delete" onclick="deletePatient(${p.id})">🗑️ حذف</button>
                    </td>
                </tr>
            `;
        });
    }

    function viewPatient(id) {
        const patients = JSON.parse(localStorage.getItem('allPatientsList')) || [];
        const patient = patients.find(p => p.id === id);
        if(patient) {
            localStorage.setItem('luxuryPatientReport', JSON.stringify(patient));
            window.location.href = 'results.html';
        }
    }

    function deletePatient(id) {
        if(confirm('هل أنت متأكد من حذف هذا المريض نهائياً؟')) {
            let patients = JSON.parse(localStorage.getItem('allPatientsList')) || [];
            patients = patients.filter(p => p.id !== id);
            localStorage.setItem('allPatientsList', JSON.stringify(patients));
            loadPatients();
        }
    }

    // دالة إرسال الواتساب المباشرة من السجل
    function sendWhatsAppDirect(index) {
        const patients = JSON.parse(localStorage.getItem('allPatientsList')) || [];
        const p = patients[index];

        if (!p || !p.phone || p.phone === 'غير مسجل') {
            alert("هذا المريض لا يمتلك رقم هاتف مسجل أو تم إدخاله قبل التحديث!");
            return;
        }

        let messageText = `🏥 *مختبر مركز الحياة لغسيل الكلى* 🏥\n\n`;
        messageText += `👤 *المريض:* ${p.name}\n`;
        messageText += `📅 *التاريخ:* ${p.date}\n`;
        messageText += `🚪 *الردهة:* ${p.ward}\n`;
        messageText += `------------------------------------\n`;
        messageText += `🧪 *نتائج التحاليل الطبية:* \n\n`;

        if (p.tests && Object.keys(p.tests).length > 0) {
            for (const [testName, testValue] of Object.entries(p.tests)) {
                messageText += `🔹 *${testName}:* ${testValue}\n`;
            }
        } else {
            messageText += `لا توجد تحاليل مسجلة.\n`;
        }

        messageText += `------------------------------------\n`;
        messageText += `✨ *تمنياتنا لكم بالصحة والشفاء العاجل* ✨`;

        const encodedText = encodeURIComponent(messageText);
        let phoneNumber = p.phone.trim();
        if (phoneNumber.startsWith('0')) {
            phoneNumber = '964' + phoneNumber.substring(1);
        }

        const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedText}`;
        window.open(whatsappUrl, '_blank');
    }

    // تشغيل الدالة عند فتح الصفحة
    window.onload = loadPatients;
</script>

</body>
</html>

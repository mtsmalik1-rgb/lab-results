<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر مركز الحياة - نتيجة التحليل</title>
    <style>
        :root {
            --primary-color: #0c4a6e; /* أزرق طبي رسمي غامق */
            --secondary-color: #0284c7; /* أزرق فاتح للخطوط */
            --text-color: #000000;
            --bg-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
        }

        /* حاوية التقرير الرسمية مثل الورقة المطبوعة */
        .report-container {
            background-color: var(--bg-color);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            box-sizing: border-box;
            border: 2px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        /* الهيدر الكلاسيكي العريض للفورما */
        .main-header {
            border: 3px solid var(--primary-color);
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
            background-color: #f8fafc;
        }

        .main-header h1 {
            margin: 0 0 5px 0;
            color: var(--primary-color);
            font-size: 28px;
            font-weight: bold;
        }

        .main-header p {
            margin: 0;
            color: var(--secondary-color);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* جدول بيانات المريض المنظم (نظام الخلايا) */
        .patient-info-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .patient-info-table td {
            border: 1px solid var(--primary-color);
            padding: 10px 15px;
            font-size: 15px;
        }

        .patient-info-table td.label {
            background-color: #f1f5f9;
            font-weight: bold;
            color: var(--primary-color);
            width: 15%;
        }

        .patient-info-table td.value {
            width: 35%;
            font-weight: 600;
        }

        /* جدول النتائج الرئيسي المطابق للصورة */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .results-table th {
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            font-size: 15px;
            border: 1px solid var(--primary-color);
        }

        .results-table td {
            border: 1px solid var(--secondary-color);
            padding: 12px;
            text-align: center;
            font-size: 15px;
        }

        .results-table tr:nth-child(even) {
            background-color: #f8fafc;
        }

        .test-name-cell {
            text-align: right !important;
            font-weight: bold;
            padding-right: 20px !important;
            color: var(--primary-color);
        }

        .test-value-cell {
            font-weight: bold;
            font-size: 16px;
        }

        /* قسم الملاحظات أسفل الجدول */
        .notes-section {
            border: 1px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 40px;
            border-radius: 4px;
            background-color: #fafafa;
        }

        .notes-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 5px;
            font-size: 14px;
        }

        .notes-content {
            font-size: 14px;
            color: #475569;
            line-height: 1.6;
        }

        /* التواقيع الرسمية في نهاية الورقة */
        .signatures-row {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            padding: 0 20px;
        }

        .signature-space {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .signature-line {
            margin-top: 40px;
            width: 180px;
            border-top: 1px solid var(--primary-color);
        }

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير النتائج المخبرية - مركز الحياة</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .report-card {
            background: #fff;
            max-width: 800px;
            width: 100%;
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            box-sizing: border-box;
            border-top: 8px solid #0284c7;
        }
        .hospital-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0284c7;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .hospital-logo-text h1 {
            margin: 0;
            font-size: 26px;
            color: #0284c7;
        }
        .hospital-logo-text p {
            margin: 5px 0 0 0;
            color: #64748b;
            font-size: 14px;
        }
        .report-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 13px;
        }
        .patient-info-bar {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        .info-item span {
            color: #64748b;
            display: block;
            font-size: 12px;
            margin-bottom: 3px;
        }
        .info-item strong {
            color: #1e293b;
            font-size: 16px;
        }
        table.results-table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            margin-bottom: 40px;
        }
        table.results-table th {
            background-color: #f8fafc;
            color: #475569;
            padding: 12px 16px;
            border-bottom: 2px solid #cbd5e1;
            text-align: center;
        }
        table.results-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 16px;
            text-align: center;
        }
        .test-name { font-weight: bold; color: #0284c7; }
        .test-val { font-weight: 700; color: #1e293b; }
        .footer-signatures {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px dashed #cbd5e1;
        }
        .signature-box { text-align: center; width: 180px; font-size: 14px; }
        .signature-line { margin-top: 40px; border-top: 1px solid #cbd5e1; }
        .actions-bar { margin-top: 30px; display: flex; gap: 15px; }
        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-print { background: #0284c7; color: white; }
        .btn-back { background: #64748b; color: white; }
        
        @media print {
            body { background: none; padding: 0; }
            .report-card { box-shadow: none; padding: 10px; max-width: 100%; border-top: none; }
            .actions-bar { display: none; }
        }
    </style>
</head>
<body>

    <div class="report-card">
        <div class="hospital-header">
            <div class="hospital-logo-text">
                <h1>مختبر مركز الحياة لغسيل الكلى</h1>
                <p>تقرير التحاليل الطبية المخبرية المعتمد</p>
            </div>
            <div class="report-badge">BIOCHEMISTRY REPORT</div>
        </div>

        <div class="patient-info-bar">
            <div class="info-item"><span>اسم المريض (Patient Name)</span><strong id="outName">-</strong></div>
            <div class="info-item"><span>الردهة (Ward)</span><strong id="outWard" style="color: #d97706;">-</strong></div>
            <div class="info-item"><span>تاريخ التقرير (Date)</span><strong id="outDate">-</strong></div>
        </div>

        <table class="results-table">
            <thead>
                <tr>
                    <th style="width: 50%;">اسم الفحص المخبري (Test Name)</th>
                    <th style="width: 50%;">النتيجة (Result)</th>
                </tr>
            </thead>
            <tbody id="resultsTableBody"></tbody>
        </table>

        <div class="footer-signatures">
            <div class="signature-box"><span>الفاحص المخبري</span><div class="signature-line"></div></div>
            <div class="signature-box"><span>طبيب المختبر المسؤول</span><div class="signature-line"></div></div>
        </div>
    </div>

    <div class="actions-bar">
        <button onclick="window.print()" class="btn btn-print">طباعة التقرير الفاخر 🖨️</button>
        <a href="all-patients.html" class="btn btn-back" style="background: #2563eb;">🗂️ العودة لسجل المرضى</a>
        <a href="index.html" class="btn btn-back">← إدخال مريض جديد</a>
    </div>

    <script>
        const storedData = localStorage.getItem('luxuryPatientReport');

        if (storedData) {
            const data = JSON.parse(storedData);
            document.getElementById('outName').innerText = data.name;
            document.getElementById('outWard').innerText = data.ward;
            document.getElementById('outDate').innerText = data.date;

            const tbody = document.getElementById('resultsTableBody');
            tbody.innerHTML = "";
            
            Object.keys(data.tests).forEach(testKey => {
                tbody.innerHTML += `
                    <tr>
                        <td class="test-name">${testKey}</td>
                        <td class="test-val">${data.tests[testKey]}</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر مركز الحياة - نتيجة التحليل</title>
    <style>
        :root {
            --bg-main: #f4f6f9;
            --surface: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --brand: #0284c7;
            --brand-light: #f0f9ff;
            --success: #22c55e;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* حاوية التقرير العصرية */
        .report-wrapper {
            background: var(--surface);
            max-width: 750px;
            width: 100%;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        /* خلفية جمالية خفيفة تعطي طابع طبي للمختبر */
        .report-wrapper::after {
            content: "🧪";
            position: absolute;
            font-size: 300px;
            opacity: 0.02;
            bottom: -50px;
            left: -50px;
            pointer-events: none;
        }

        /* الهيدر الحديث */
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 25px;
            margin-bottom: 30px;
        }

        .brand-title h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            color: var(--brand);
        }

        .brand-title p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .report-badge {
            background: var(--brand-light);
            color: var(--brand);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* تصميم الكروت المنفصلة لبيانات المريض */
        .patient-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 35px;
        }

        .info-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-card .card-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .info-card .card-value {
            font-size: 16px;
            color: var(--text-dark);
            font-weight: 700;
        }

        /* إعادة ابتكار جدول النتائج لتكون على شكل بطاقات مبوبة */
        .results-section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 40px;
        }

        .test-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .test-row:hover {
            border-color: var(--brand);
            transform: translateX(-4px);
        }

        .test-meta {
            display: flex;
            flex-direction: column;
        }

        .test-code {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .test-dept {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .test-final-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--brand);
            background: var(--brand-light);
            padding: 6px 16px;
            border-radius: 10px;
            min-width: 60px;
            text-align: center;
        }

        /* التوقيعات */
        .footer-signatures {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
        }

        .sig-box {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .sig-line {
            margin-top: 35px;
            width: 150px;
            border-top: 1px dashed var(--text-muted);
        }

        /* قسم الأزرار */
        .actions-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
            max-width: 750px;
        }

        .action-button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.15);
        }

        .btn-primary-action {
            background-color: var(--brand);
            color: white;
        }

        .btn-success-action {
            background-color: var(--success);
            color: white;
        }

        .btn-outline-action {
            background-color: var(--surface);
            color: var(--text-dark);
            border: 1px solid var(--border);
            text-decoration: none;
        }

        /* تحسينات الطباعة لتبدو كالحقيقة */
        @media print {
            body { padding: 0; background: white; }
            .report-wrapper { box-shadow: none; border: none; padding: 0; }
            .report-wrapper::after { display: none; }
            .test-row { background: none; border-radius: 0; border: none; border-bottom: 1px solid #cbd5e1; padding: 10px 0; }
            .test-final-value { background: none; padding: 0; }
            .actions-container { display: none; }
        }
    </style>
</head>
<body>

<div class="report-wrapper">
    <div class="report-header">
        <div class="brand-title">
            <h1>مختبر مركز الحياة</h1>
            <p>لغسيل الكلى والتحاليل الطبية الفورية</p>
        </div>
        <div class="report-badge">LABORATORY REPORT</div>
    </div>

    <div class="patient-grid">
        <div class="info-card">
            <span class="card-label">اسم المريض</span>
            <span class="card-value" id="outName">-</span>
        </div>
        <div class="info-card">
            <span class="card-label">تاريخ الفحص</span>
            <span class="card-value" id="outDate">-</span>
        </div>
        <div class="info-card">
            <span class="card-label">الردهة المتواجد بها</span>
            <span class="card-value" id="outWard">-</span>
        </div>
        <div class="info-card">
            <span class="card-label">رقم التواصل</span>
            <span class="card-value" id="outPhone">-</span>
        </div>
    </div>

    <div class="results-section-title">🧪 نتائج الفحوصات الحالية:</div>
    
    <div class="results-list" id="resultsContainer">
    </div>

    <div class="footer-signatures">
        <div class="sig-box">
            <span>توقيع الفاحص المخبري</span>
            <div class="sig-line"></div>
        </div>
        <div class="sig-box">
            <span>طبيب المختبر المسؤول</span>
            <div class="sig-line"></div>
        </div>
    </div>
</div>

<div class="actions-container">
    <button class="action-button btn-primary-action" onclick="window.print()">🖨️ طباعة التقرير</button>
    <button class="action-button btn-success-action" onclick="sendWhatsApp()">🟢 إرسال واتساب</button>
    <a href="index.html" class="action-button btn-outline-action">← مريض جديد</a>
</div>

<script>
    const patient = JSON.parse(localStorage.getItem('luxuryPatientReport'));

    if (patient) {
        document.getElementById('outName').innerText = patient.name;
        document.getElementById('outDate').innerText = patient.date;
        document.getElementById('outWard').innerText = patient.ward;
        document.getElementById('outPhone').innerText = patient.phone || "غير محدد";

        const container = document.getElementById('resultsContainer');
        if (patient.tests && Object.keys(patient.tests).length > 0) {
            for (const [testName, testValue] of Object.entries(patient.tests)) {
                container.innerHTML += `
                    <div class="test-row">
                        <div class="test-meta">
                            <span class="test-code">${testName}</span>
                            <span class="test-dept">Biochemistry Analysis</span>
                        </div>
                        <span class="test-final-value">${testValue}</span>
                    </div>
                `;
            }
        } else {
            container.innerHTML = `<div style="text-align:center; padding: 20px; color:var(--text-muted);">لا توجد تحاليل مدخلة.</div>`;
        }
    } else {
        alert("خطأ: لم يتم العثور على بيانات المريض!");
    }

    function sendWhatsApp() {
        if (!patient || !patient.phone) {
            alert("لا يوجد رقم هاتف مسجل لهذا المريض!");
            return;
        }

        let messageText = `🏥 *مختبر مركز الحياة لغسيل الكلى* 🏥\n\n`;
        messageText += `👤 *المريض:* ${patient.name}\n`;
        messageText += `📅 *التاريخ:* ${patient.date}\n`;
        messageText += `🚪 *الردهة:* ${patient.ward}\n`;
        messageText += `------------------------------------\n`;
        messageText += `🧪 *نتائج التحاليل الطبية:* \n\n`;

        if (patient.tests && Object.keys(patient.tests).length > 0) {
            for (const [testName, testValue] of Object.entries(patient.tests)) {
                messageText += `🔹 *${testName}:* ${testValue}\n`;
            }
        }

        messageText += `------------------------------------\n`;
        messageText += `✨ *تمنياتنا لكم بالصحة والشفاء العاجل* ✨`;

        const encodedText = encodeURIComponent(messageText);
        let phoneNumber = patient.phone.trim();
        if (phoneNumber.startsWith('0')) {
            phoneNumber = '964' + phoneNumber.substring(1);
        }

        const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedText}`;
        window.open(whatsappUrl, '_blank');
    }
</script>

</body>
</html>

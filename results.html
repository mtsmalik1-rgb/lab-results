<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر مركز الحياة - نتيجة التحليل</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .report-card {
            background: white;
            max-width: 650px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .report-header {
            text-align: center;
            border-bottom: 3px double #0284c7;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .report-header h1 {
            color: #0284c7;
            margin: 0 0 5px 0;
            font-size: 28px;
        }
        .patient-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .info-item span {
            font-weight: bold;
            color: #334155;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        th, td {
            border: 1px solid #cbd5e1;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #0284c7;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f8fafc;
        }
        .actions-area {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-print {
            background-color: #64748b;
            color: white;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
        }
        .btn-whatsapp:hover {
            background-color: #1ebd58;
        }
        .btn-back {
            background-color: #e2e8f0;
            color: #334155;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
        }
        @media print {
            body { padding: 0; background: white; }
            .report-card { box-shadow: none; border: none; padding: 0; }
            .actions-area { display: none; }
        }
    </style>
</head>
<body>

<div class="report-card">
    <div class="report-header">
        <h1>مختبر مركز الحياة لغسيل الكلى</h1>
        <p>تقرير التحاليل المختبرية الفورية</p>
    </div>

    <div class="patient-info">
        <div class="info-item"><span>اسم المريض:</span> <span id="outName">-</span></div>
        <div class="info-item"><span>التاريخ:</span> <span id="outDate">-</span></div>
        <div class="info-item"><span>الردهة:</span> <span id="outWard">-</span></div>
        <div class="info-item"><span>رقم الهاتف:</span> <span id="outPhone">-</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>اسم التحليل (Test)</th>
                <th>النتيجة (Result)</th>
            </tr>
        </thead>
        <tbody id="resultsTableBody">
        </tbody>
    </table>

    <div class="actions-area">
        <button class="btn btn-print" onclick="window.print()">🖨️ طباعة التقرير</button>
        <button class="btn btn-whatsapp" onclick="sendWhatsApp()">🟢 إرسال عبر الواتساب</button>
        <a href="index.html" class="btn btn-back">➕ مريض جديد</a>
    </div>
</div>

<script>
    const patient = JSON.parse(localStorage.getItem('luxuryPatientReport'));

    if (patient) {
        document.getElementById('outName').innerText = patient.name;
        document.getElementById('outDate').innerText = patient.date;
        document.getElementById('outWard').innerText = patient.ward;
        document.getElementById('outPhone').innerText = patient.phone || "غير محدد";

        const tbody = document.getElementById('resultsTableBody');
        if (patient.tests && Object.keys(patient.tests).length > 0) {
            for (const [testName, testValue] of Object.entries(patient.tests)) {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: bold; color: #0284c7;">${testName}</td>
                        <td style="font-weight: bold; color: #1e293b;">${testValue}</td>
                    </tr>
                `;
            }
        } else {
            tbody.innerHTML = `<tr><td colspan="2">لم يتم إدخال أي نتائج تحاليل.</td></tr>`;
        }
    } else {
        alert("خطأ: لم يتم العثور على بيانات المريض!");
    }

    function sendWhatsApp() {
        if (!patient || !patient.phone) {
            alert("لا يوجد رقم هاتف مسجل لهذا المريض لإرسال النتيجة إليه!");
            return;
        }

        let messageText = `🏥 *مختبر مركز الحياة لغسيل الكلى* 🏥\n\n`;
        messageText += `👤 *المريض:* ${patient.name}\n`;
        messageText += `📅 *التاريخ:* ${patient.date}\n`;
        messageText += `🚪 *الردهة:* ${patient.ward}\n`;
        messageText += `------------------------------------\n`;
        messageText += `🧪 *نتائج التحاليل الطبية:* \n\n`;

        if (patient.tests && Object.keys(patient.tests).length > 0) {
            for (const [testName, testValue] of Object.entries(patient.tests)) {
                messageText += `🔹 *${testName}:* ${testValue}\n`;
            }
        } else {
            messageText += `لا توجد تحاليل مسجلة.\n`;
        }

        messageText += `------------------------------------\n`;
        messageText += `✨ *تمنياتنا لكم بالصحة والشفاء العاجل* ✨`;

        const encodedText = encodeURIComponent(messageText);

        let phoneNumber = patient.phone.trim();
        if (phoneNumber.startsWith('0')) {
            phoneNumber = '964' + phoneNumber.substring(1);
        }

        const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedText}`;
        window.open(whatsappUrl, '_blank');
    }
</script>

</body>
</html>
